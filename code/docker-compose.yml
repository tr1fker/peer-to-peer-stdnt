services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: peerlending
      POSTGRES_USER: peerlending
      POSTGRES_PASSWORD: peerlending
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peerlending -d peerlending"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: peerlending
      DB_USER: peerlending
      DB_PASSWORD: peerlending
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1
      # SPA after GitHub (compose maps frontend host port 5173 → container 80)
      FRONTEND_OAUTH_REDIRECT: ${FRONTEND_OAUTH_REDIRECT:-http://localhost:5173/auth/callback}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-github-not-configured}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-github-not-configured}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-google-not-configured}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-google-not-configured}
      # Почта: задайте в .env (см. .env.example). Без этого письма не отправляются — ссылка только в логах backend.
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
